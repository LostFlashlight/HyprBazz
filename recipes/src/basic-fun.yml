modules:
  - type: dnf
    repos:
      copr:
        - tofik/nwg-shell
    install:
      packages:
        - polkit-kde
        - foot
        - nwg-displays
        - nautilus

        ## QT
        - qt6-qtwayland
        - qt5-qtwayland
        - hyprqt6engine
        - kvantum
  - type: script
    snippets:
      #- wget -qO- https://apx.vanillaos.org/install.sh | bash
      - chmod a+x /bin/update
      - chmod a+x /bin/hyprltm-net
      - systemctl --global enable ssh-agent

    scripts:
      - get_clipvault.sh

  - type: systemd
    # this example disables automatic flatpak updates and enables a custom service unit for all users
    user:
      enabled:
        - plasma-polkit-agent.service
