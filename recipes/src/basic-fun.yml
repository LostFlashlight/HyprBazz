modules:
  - type: dnf
    repos:
      copr:
        - tofik/nwg-shell
        - nett00n/hyprland
    install:
      packages:
        - hyprpolkitagent #polkit-kde
        - foot
        - nwg-displays
        - nautilus

        # hypr utilities
        - hyprpwcenter
        - hyprshutdown
        - hyprsysteminfo
        # Plugin support
        ## required packages
        - cmake
        - cpio
        - pkg-config
        - git
        - g++
        - gcc
        - hyprland-plugins

        ## QT
        - qt6-qtwayland
        - qt5-qtwayland
        - hyprqt6engine
        - kvantum
  - type: script
    snippets:
      #- wget -qO- https://apx.vanillaos.org/install.sh | bash
      - chmod a+x /bin/update
      - chmod a+x /bin/hyprltm-net
      - systemctl --global enable ssh-agent

    scripts:
      - get_clipvault.sh

  - type: systemd
    # this example disables automatic flatpak updates and enables a custom service unit for all users
    user:
      enabled:
        - hyprpolkitagent.service
