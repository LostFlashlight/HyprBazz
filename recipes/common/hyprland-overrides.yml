modules:
  - type: dnf
    repos:
      copr:
        enable:
          - solopasha/hyprland
    remove:
      packages:
        - hyprland
        - waybar
        - xdg-desktop-portal-hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - hyprland-qtutils

  - type: dnf
    repos:
      copr:
        dispable:
          - solopasha/hyprland
        enable:
          - nett00n/hyprland
    install:
      install-weak-deps: false
      packages:
        - hyprland
        - waybar
        - xdg-desktop-portal-hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - hyprland-guiutils # replacemanet for qtutils
